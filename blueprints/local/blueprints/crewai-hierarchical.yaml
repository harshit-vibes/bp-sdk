  name: CrewAI Hierarchical Task Delegation
  description: Multi-agent system implementing CrewAI-inspired hierarchical task
    delegation patterns with specialized workers for research, analysis, 
    writing, planning, and quality review.
  category: featured
  tags:
    - featured
    - multi-agent
